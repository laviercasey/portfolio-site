services:
  postgres:
    image: postgres:16-alpine
    container_name: portfolio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - portfolio-internal
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  backend:
    image: ghcr.io/laviercasey/portfolio-site/backend:${IMAGE_TAG:-latest}
    container_name: portfolio-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://portfolio:${DB_PASSWORD}@postgres:5432/portfolio?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      UPLOAD_DIR: /data/uploads
      PORT: "8080"
      UMAMI_API_URL: ${UMAMI_API_URL:-}
      UMAMI_API_KEY: ${UMAMI_API_KEY:-}
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_STARS_SYNC_INTERVAL_HOURS: ${GITHUB_STARS_SYNC_INTERVAL_HOURS:-6}
    volumes:
      - uploads:/data/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - portfolio-internal
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  migrate:
    image: ghcr.io/laviercasey/portfolio-site/backend:${IMAGE_TAG:-latest}
    container_name: portfolio-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://portfolio:${DB_PASSWORD}@postgres:5432/portfolio?sslmode=disable
    entrypoint: ["sh", "-c"]
    command:
      - 'goose -dir /migrations postgres "$$DATABASE_URL" up'
    profiles: ["migrate"]
    restart: "no"
    networks:
      - portfolio-internal

  frontend:
    image: ghcr.io/laviercasey/portfolio-site/frontend:${IMAGE_TAG:-latest}
    container_name: portfolio-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_INTERNAL_URL: http://backend:8080
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_SLUG: ${ADMIN_SLUG:-casey-admin}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_YANDEX_METRICA_ID: ${NEXT_PUBLIC_YANDEX_METRICA_ID:-}
      NEXT_PUBLIC_UMAMI_SRC: ${NEXT_PUBLIC_UMAMI_SRC:-}
      NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
      NEXT_PUBLIC_UMAMI_ALLOWED_HOSTS: ${NEXT_PUBLIC_UMAMI_ALLOWED_HOSTS:-}
      GOOGLE_VERIFICATION: ${GOOGLE_VERIFICATION:-}
      YANDEX_VERIFICATION: ${YANDEX_VERIFICATION:-}
      INDEXNOW_KEY: ${INDEXNOW_KEY:-}
      INDEXNOW_API_SECRET: ${INDEXNOW_API_SECRET:-}
      NODE_ENV: production
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - portfolio-internal
      - caddy-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

volumes:
  pgdata:
  uploads:
    name: portfolio_uploads

networks:
  portfolio-internal:
    driver: bridge
  caddy-net:
    external: true
