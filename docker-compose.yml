services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://portfolio:${DB_PASSWORD}@postgres:5432/portfolio?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      UPLOAD_DIR: /data/uploads
      PORT: "8080"
      LOG_LEVEL: debug
      APP_ENV: dev
      UMAMI_API_URL: ${UMAMI_API_URL:-}
      UMAMI_API_KEY: ${UMAMI_API_KEY:-}
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
    volumes:
      - uploads:/data/uploads
    ports:
      - "8088:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_INTERNAL_URL: http://backend:8080
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_SLUG: ${ADMIN_SLUG:-casey-admin}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NODE_ENV: development
      COOKIE_SECURE: "false"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NEXT_PUBLIC_UMAMI_SRC: ${NEXT_PUBLIC_UMAMI_SRC:-}
      NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
      NEXT_PUBLIC_UMAMI_ALLOWED_HOSTS: ${NEXT_PUBLIC_UMAMI_ALLOWED_HOSTS:-}
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./messages:/app/messages
      - ./package.json:/app/package.json
      - ./next.config.js:/app/next.config.js
      - ./tailwind.config.ts:/app/tailwind.config.ts
      - ./postcss.config.js:/app/postcss.config.js
      - ./tsconfig.json:/app/tsconfig.json
      - next-cache:/app/.next
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  umami-db:
    image: postgres:16-alpine
    container_name: portfolio-umami-db-dev
    restart: unless-stopped
    profiles: ["analytics"]
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami_local_dev
    volumes:
      - umami-pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 5s
      timeout: 5s
      retries: 10

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: portfolio-umami-dev
    restart: unless-stopped
    profiles: ["analytics"]
    depends_on:
      umami-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://umami:umami_local_dev@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      HASH_SALT: dev_hash_salt_not_for_prod_use_32b
      APP_SECRET: dev_app_secret_not_for_prod_use_32b
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
  uploads:
  next-cache:
  umami-pgdata-dev:
