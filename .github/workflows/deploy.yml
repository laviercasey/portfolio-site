name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      sha_short: ${{ steps.meta.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.sha_short }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.sha_short }}

  backup:
    name: Pre-deploy DB backup
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Create backup on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            BACKUP_DIR=/opt/backups/portfolio
            mkdir -p "$BACKUP_DIR"
            TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
            SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
            BACKUP_FILE="$BACKUP_DIR/pre-deploy-$TIMESTAMP-$SHA_SHORT.sql.gz"

            cd /opt/apps/portfolio

            if ! docker compose ps postgres --status running --format '{{.Name}}' | grep -q portfolio-postgres; then
              echo "postgres not running yet — skipping backup (likely first deploy)"
              exit 0
            fi

            set -a; . ./.env; set +a

            docker compose exec -T postgres pg_dump \
              -U portfolio -d portfolio --clean --if-exists --no-owner --no-privileges \
              | gzip > "$BACKUP_FILE"

            SIZE=$(stat -c%s "$BACKUP_FILE")
            if [ "$SIZE" -lt 1024 ]; then
              echo "ERROR: backup suspiciously small: $SIZE bytes"
              exit 1
            fi

            find "$BACKUP_DIR" -name '*.sql.gz' -mtime +30 -delete

            echo "backup ok: $BACKUP_FILE ($(du -h "$BACKUP_FILE" | cut -f1))"

  deploy:
    name: Deploy + health-gate + auto-rollback
    runs-on: ubuntu-latest
    needs: [build-push, backup]
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose to VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/apps/portfolio/

      - name: Deploy + health-gate + auto-rollback
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/apps/portfolio
            mv -f docker-compose.prod.yml docker-compose.yml

            PREV_SHA=$(cat .last-good-sha 2>/dev/null || echo "")
            NEW_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

            if grep -q '^IMAGE_TAG=' .env; then
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$NEW_SHA/" .env
            else
              echo "IMAGE_TAG=$NEW_SHA" >> .env
            fi

            docker pull ghcr.io/laviercasey/portfolio-site/backend:"$NEW_SHA"
            docker pull ghcr.io/laviercasey/portfolio-site/frontend:"$NEW_SHA"

            docker compose up -d postgres --wait --wait-timeout 60
            docker compose --profile migrate run --rm migrate
            docker compose up -d --remove-orphans

            DEADLINE=$(( $(date +%s) + 120 ))
            HEALTHY=0
            while [ "$(date +%s)" -lt "$DEADLINE" ]; do
              if docker compose exec -T backend wget -qO- http://localhost:8080/healthz >/dev/null 2>&1 \
                 && docker compose exec -T frontend wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1; then
                HEALTHY=1
                break
              fi
              sleep 5
            done

            if [ "$HEALTHY" -eq 1 ]; then
              echo "deploy healthy, marking $NEW_SHA as last-good"
              echo "$NEW_SHA" > .last-good-sha
              docker image prune -f
              exit 0
            fi

            echo "ERROR: deploy failed health-gate. Rolling back to ${PREV_SHA:-<none>}..."
            docker compose logs --tail=100 backend frontend postgres

            if [ -z "$PREV_SHA" ]; then
              echo "FATAL: no .last-good-sha — rollback impossible on first deploy."
              echo "Manual intervention required: restore from /opt/backups/portfolio/"
              exit 2
            fi

            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$PREV_SHA/" .env
            docker pull ghcr.io/laviercasey/portfolio-site/backend:"$PREV_SHA"
            docker pull ghcr.io/laviercasey/portfolio-site/frontend:"$PREV_SHA"
            docker compose up -d --remove-orphans

            sleep 30
            if docker compose ps backend --status running --format '{{.Name}}' | grep -q portfolio-backend \
               && docker compose ps frontend --status running --format '{{.Name}}' | grep -q portfolio-frontend; then
              echo "rollback to $PREV_SHA successful — containers are up"
              exit 1
            fi

            echo "FATAL: rollback failed too. Manual intervention required."
            echo "Backups available at /opt/backups/portfolio/"
            exit 2

  notify:
    name: Notify status
    runs-on: ubuntu-latest
    needs: [build-push, deploy]
    if: always()
    steps:
      - run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "::notice::Deployed ${{ needs.build-push.outputs.sha_short }} to production"
          else
            echo "::error::Deploy failed for ${{ needs.build-push.outputs.sha_short }} (result=${{ needs.deploy.result }})"
          fi
