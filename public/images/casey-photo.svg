<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600" role="img" aria-label="Casey Laviere portrait placeholder">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="45%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>
    <linearGradient id="mono" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <rect width="600" height="600" fill="url(#bg)" rx="120"/>

  <g opacity="0.55" filter="url(#soft)">
    <circle cx="160" cy="140" r="110" fill="#c4b5fd"/>
    <circle cx="480" cy="460" r="140" fill="#818cf8"/>
  </g>

  <g opacity="0.12" stroke="#ffffff" stroke-width="1.2" fill="none">
    <circle cx="300" cy="300" r="180"/>
    <circle cx="300" cy="300" r="220"/>
    <circle cx="300" cy="300" r="260"/>
  </g>

  <g transform="translate(300,320)" text-anchor="middle" dominant-baseline="middle">
    <text font-family="'Playfair Display', 'Georgia', serif" font-weight="800"
          font-style="italic" font-size="240" letter-spacing="-10"
          fill="url(#mono)">CL</text>
  </g>

  <rect width="600" height="600" rx="120" fill="url(#sheen)"/>

  <text x="300" y="555" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="18" letter-spacing="6" fill="#e0e7ff" opacity="0.55">
    CASEY LAVIERE
  </text>
</svg>
