    <g transform="translate(0 660)" opacity="0.55">
      <path d="M 0 0 L 120 0 L 140 -18 L 160 18 L 175 -8 L 200 0 L 320 0 L 345 -22 L 365 22 L 385 -6 L 410 0 L 540 0 L 565 -16 L 580 16 L 600 0 L 800 0"
