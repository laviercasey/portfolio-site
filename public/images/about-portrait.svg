    <path id="lineA" d="M 290 320 L 184 236"/>
    <path id="lineB" d="M 510 320 L 618 216"/>
    <path id="lineC" d="M 320 380 L 139 425"/>
    <path id="lineD" d="M 480 380 L 653 425"/>
  </defs>

  <g clip-path="url(#frame)">
