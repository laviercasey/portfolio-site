          <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.48;0.5;0.7;0.72;1" dur="12s" repeatCount="indefinite"/>
        </text>
        <text x="-180" y="50" fill-opacity="0.95">
          <tspan>deploy --prod</tspan>
          <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.72;0.74;0.98;1" dur="12s" repeatCount="indefinite"/>
        </text>
        <rect x="-30" y="38" width="9" height="16" fill="#e07040">
