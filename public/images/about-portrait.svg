          <circle cx="16" cy="16" r="3" fill="#e07040"/>
          <text x="30" y="20" fill="#e07040">RUST · CLI</text>
          <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.53;0.57;0.74;0.79;1" dur="20s" repeatCount="indefinite"/>
        </g>
        <g>
          <rect x="0" y="0" width="146" height="32" rx="16" fill="#1a120c" stroke="#d4a843" stroke-opacity="0.55"/>
          <circle cx="16" cy="16" r="3" fill="#d4a843"/>
          <text x="30" y="20" fill="#d4a843">DOCKER · CI</text>
          <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.79;0.83;0.97;1" dur="20s" repeatCount="indefinite"/>
