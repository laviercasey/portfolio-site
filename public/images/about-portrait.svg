          <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.24;0.26;0.46;0.48;1" dur="12s" repeatCount="indefinite"/>
        </text>
        <text x="-180" y="50" fill-opacity="0.95">
