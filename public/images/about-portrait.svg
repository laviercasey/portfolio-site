        </g>
        <g>
          <rect x="0" y="0" width="148" height="32" rx="16" fill="#1a120c" stroke="#e07040" stroke-opacity="0.55"/>
          <circle cx="16" cy="16" r="3" fill="#e07040"/>
          <text x="30" y="20" fill="#e07040">GO · API</text>
          <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.27;0.31;0.48;0.53;1" dur="20s" repeatCount="indefinite"/>
        </g>
        <g>
          <rect x="0" y="0" width="148" height="32" rx="16" fill="#1a120c" stroke="#d4a843" stroke-opacity="0.55"/>
          <circle cx="16" cy="16" r="3" fill="#d4a843"/>
          <text x="30" y="20" fill="#d4a843">LARAVEL</text>
          <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.53;0.57;0.74;0.79;1" dur="20s" repeatCount="indefinite"/>
        </g>
        <g>
          <rect x="0" y="0" width="148" height="32" rx="16" fill="#1a120c" stroke="#e07040" stroke-opacity="0.55"/>
          <circle cx="16" cy="16" r="3" fill="#e07040"/>
          <text x="30" y="20" fill="#e07040">POSTGRES</text>
          <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.79;0.83;0.97;1" dur="20s" repeatCount="indefinite"/>
