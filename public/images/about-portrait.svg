      <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" letter-spacing="3" fill="#d4a843" fill-opacity="0.55">
        <text x="60" y="-10">~ /home/casey</text>
        <text x="740" y="-10" text-anchor="end">
          <tspan>● ONLINE</tspan>
          <animate attributeName="opacity" values="1;0.35;1" dur="2.4s" repeatCount="indefinite"/>
        </text>
      </g>
    </g>

    <g transform="translate(400 320)">
