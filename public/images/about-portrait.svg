<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" width="800" height="720" role="img" aria-label="Casey Laviere — full-stack developer signature">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#3a2418"/>
      <stop offset="55%" stop-color="#1a120c"/>
      <stop offset="100%" stop-color="#0a0706"/>
    </radialGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a843"/>
      <stop offset="55%" stop-color="#e07040"/>
      <stop offset="100%" stop-color="#c45a30"/>
    </linearGradient>
    <linearGradient id="warmFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a843" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e07040" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#c45a30" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e07040" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#c45a30" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c45a30" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbf6ec" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#d4a843" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e07040" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#d4a843" stroke-width="0.4" stroke-opacity="0.08"/>
    </pattern>
    <clipPath id="frame">
      <rect width="800" height="720" rx="0"/>
