    <rect width="800" height="720" fill="url(#grid)"/>

    <circle cx="400" cy="320" r="240" fill="url(#glow)">
      <animate attributeName="r" values="220;260;220" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="6s" repeatCount="indefinite"/>
    </circle>

    <g transform="translate(0,40)">
