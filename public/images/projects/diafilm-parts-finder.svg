<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Diafilm parts finder">
  <defs>
    <radialGradient id="bg" cx="28%" cy="22%" r="105%">
      <stop offset="0%" stop-color="#3a2418"/>
      <stop offset="55%" stop-color="#1a120c"/>
      <stop offset="100%" stop-color="#0a0706"/>
    </radialGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a843"/>
      <stop offset="55%" stop-color="#e07040"/>
      <stop offset="100%" stop-color="#c45a30"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1a10"/>
      <stop offset="100%" stop-color="#1a120c"/>
    </linearGradient>
    <linearGradient id="strip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#241710"/>
      <stop offset="100%" stop-color="#120c08"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- soft grid -->
  <g stroke="#d4a843" stroke-width="0.5" opacity="0.05">
    <path d="M0 168 H1200 M0 336 H1200 M0 504 H1200"/>
    <path d="M200 0 V675 M400 0 V675 M600 0 V675 M800 0 V675 M1000 0 V675"/>
  </g>

  <!-- Filmstrip (centered, slightly tilted) -->
  <g transform="translate(180 165) rotate(-4 510 165)">
    <!-- strip background -->
    <rect x="0" y="0" width="1020" height="330" rx="6" fill="url(#strip)" stroke="#d4a843" stroke-width="1" stroke-opacity="0.25"/>

    <!-- top sprocket holes -->
    <g fill="#0a0706">
      <rect x="18"  y="14" width="36" height="22" rx="3"/>
      <rect x="78"  y="14" width="36" height="22" rx="3"/>
      <rect x="138" y="14" width="36" height="22" rx="3"/>
      <rect x="198" y="14" width="36" height="22" rx="3"/>
      <rect x="258" y="14" width="36" height="22" rx="3"/>
      <rect x="318" y="14" width="36" height="22" rx="3"/>
      <rect x="378" y="14" width="36" height="22" rx="3"/>
      <rect x="438" y="14" width="36" height="22" rx="3"/>
      <rect x="498" y="14" width="36" height="22" rx="3"/>
      <rect x="558" y="14" width="36" height="22" rx="3"/>
      <rect x="618" y="14" width="36" height="22" rx="3"/>
      <rect x="678" y="14" width="36" height="22" rx="3"/>
      <rect x="738" y="14" width="36" height="22" rx="3"/>
      <rect x="798" y="14" width="36" height="22" rx="3"/>
      <rect x="858" y="14" width="36" height="22" rx="3"/>
      <rect x="918" y="14" width="36" height="22" rx="3"/>
      <rect x="978" y="14" width="36" height="22" rx="3"/>
    </g>
    <!-- bottom sprocket holes -->
    <g fill="#0a0706">
      <rect x="18"  y="294" width="36" height="22" rx="3"/>
      <rect x="78"  y="294" width="36" height="22" rx="3"/>
      <rect x="138" y="294" width="36" height="22" rx="3"/>
      <rect x="198" y="294" width="36" height="22" rx="3"/>
      <rect x="258" y="294" width="36" height="22" rx="3"/>
      <rect x="318" y="294" width="36" height="22" rx="3"/>
      <rect x="378" y="294" width="36" height="22" rx="3"/>
      <rect x="438" y="294" width="36" height="22" rx="3"/>
      <rect x="498" y="294" width="36" height="22" rx="3"/>
      <rect x="558" y="294" width="36" height="22" rx="3"/>
      <rect x="618" y="294" width="36" height="22" rx="3"/>
      <rect x="678" y="294" width="36" height="22" rx="3"/>
      <rect x="738" y="294" width="36" height="22" rx="3"/>
      <rect x="798" y="294" width="36" height="22" rx="3"/>
      <rect x="858" y="294" width="36" height="22" rx="3"/>
      <rect x="918" y="294" width="36" height="22" rx="3"/>
      <rect x="978" y="294" width="36" height="22" rx="3"/>
    </g>

    <!-- frames -->
    <g transform="translate(40 56)">
      <!-- frame 1 -->
      <rect x="0" y="0" width="220" height="220" fill="url(#frame)" stroke="#d4a843" stroke-width="1.5" stroke-opacity="0.55"/>
      <text x="110" y="120" text-anchor="middle"
            font-family="Georgia, serif" font-style="italic" font-weight="900"
            font-size="92" fill="url(#grad)">1</text>
      <text x="110" y="180" text-anchor="middle"
            font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14"
            fill="#d4a843" opacity="0.55" letter-spacing="2">PART · 1/3</text>

      <!-- frame 2 -->
      <rect x="240" y="0" width="220" height="220" fill="url(#frame)" stroke="#d4a843" stroke-width="1.5" stroke-opacity="0.55"/>
      <text x="350" y="120" text-anchor="middle"
            font-family="Georgia, serif" font-style="italic" font-weight="900"
            font-size="92" fill="url(#grad)">2</text>
      <text x="350" y="180" text-anchor="middle"
            font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14"
            fill="#d4a843" opacity="0.55" letter-spacing="2">PART · 2/3</text>

      <!-- frame 3 -->
      <rect x="480" y="0" width="220" height="220" fill="url(#frame)" stroke="#d4a843" stroke-width="1.5" stroke-opacity="0.55"/>
      <text x="590" y="120" text-anchor="middle"
            font-family="Georgia, serif" font-style="italic" font-weight="900"
            font-size="92" fill="url(#grad)">3</text>
      <text x="590" y="180" text-anchor="middle"
            font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14"
            fill="#d4a843" opacity="0.55" letter-spacing="2">PART · 3/3</text>

      <!-- linking marker frame (faded) -->
      <rect x="720" y="0" width="220" height="220" fill="url(#frame)" stroke="#d4a843" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="6 5"/>
      <text x="830" y="125" text-anchor="middle"
            font-family="Georgia, serif" font-style="italic" font-weight="700"
            font-size="48" fill="#d4a843" opacity="0.4">?</text>
    </g>
  </g>

  <!-- Magnifying glass -->
  <g transform="translate(870 460) rotate(-15)" stroke="url(#grad)" stroke-width="9" fill="none" stroke-linecap="round">
    <circle cx="0" cy="0" r="60" fill="#1a120c" fill-opacity="0.4"/>
    <line x1="44" y1="44" x2="100" y2="100"/>
  </g>

  <!-- Caption -->
  <text x="80" y="625" font-family="ui-monospace, 'JetBrains Mono', monospace"
        font-size="22" fill="#d4a843" opacity="0.55"
        letter-spacing="2">PYTHON · FUZZY MATCHING · MULTI-PART FILMSTRIP CATALOG</text>
</svg>
