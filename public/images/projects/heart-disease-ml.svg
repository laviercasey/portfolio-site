<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Heart disease ML benchmark">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#3a2418"/>
      <stop offset="60%" stop-color="#1a120c"/>
      <stop offset="100%" stop-color="#0a0706"/>
    </radialGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a843"/>
      <stop offset="55%" stop-color="#e07040"/>
      <stop offset="100%" stop-color="#c45a30"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#d4a843" stop-opacity="0"/>
      <stop offset="20%" stop-color="#d4a843" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#e07040" stop-opacity="0.95"/>
      <stop offset="80%" stop-color="#c45a30" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#c45a30" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#d4a843" stroke-width="0.5" opacity="0.06">
    <path d="M0 168 H1200 M0 336 H1200 M0 504 H1200"/>
    <path d="M200 0 V675 M400 0 V675 M600 0 V675 M800 0 V675 M1000 0 V675"/>
  </g>

  <!-- ECG line glow + sharp (full width decoration, centered) -->
  <path d="M0 235 L300 235 L340 235 L360 205 L380 275 L400 110 L420 360 L440 235 L760 235 L800 235 L820 205 L840 275 L860 110 L880 360 L900 235 L1200 235"
        fill="none" stroke="url(#line)" stroke-width="14" opacity="0.30" filter="url(#glow)"/>
  <path d="M0 235 L300 235 L340 235 L360 205 L380 275 L400 110 L420 360 L440 235 L760 235 L800 235 L820 205 L840 275 L860 110 L880 360 L900 235 L1200 235"
        fill="none" stroke="url(#line)" stroke-width="3"/>

  <!-- Heart (center, smaller, well within safe zone) -->
  <g transform="translate(600 240)">
    <path d="M 0 -8 C -22 -68, -120 -68, -120 -8 C -120 56, -22 112, 0 144 C 22 112, 120 56, 120 -8 C 120 -68, 22 -68, 0 -8 Z"
          fill="url(#grad)" opacity="0.20" filter="url(#glow)" transform="scale(1.08)"/>
    <path d="M 0 -8 C -22 -68, -120 -68, -120 -8 C -120 56, -22 112, 0 144 C 22 112, 120 56, 120 -8 C 120 -68, 22 -68, 0 -8 Z"
          fill="url(#grad)"/>
    <!-- inner ECG inside heart -->
    <path d="M -88 4 L -40 4 L -22 -22 L -8 32 L 8 -38 L 24 38 L 40 4 L 88 4"
          fill="none" stroke="#1a120c" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  </g>

  <!-- Big metric (centered horizontally, in safe zone) -->
  <text x="600" y="475" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-weight="900" font-size="82"
        fill="url(#grad)" letter-spacing="-2">ROC-AUC 0.948</text>

  <!-- Sub-metric line (centered, gold pills with mono numbers) -->
  <g transform="translate(600 530)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="20">
    <!-- patients pill -->
    <g transform="translate(-260 0)">
      <rect x="-90" y="-22" width="180" height="36" rx="18"
            fill="#d4a843" fill-opacity="0.10" stroke="#d4a843" stroke-opacity="0.4" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" fill="#d4a843" opacity="0.85" letter-spacing="1">1 904 PATIENTS</text>
    </g>
    <!-- datasets pill -->
    <g transform="translate(0 0)">
      <rect x="-80" y="-22" width="160" height="36" rx="18"
            fill="#d4a843" fill-opacity="0.10" stroke="#d4a843" stroke-opacity="0.4" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" fill="#d4a843" opacity="0.85" letter-spacing="1">6 DATASETS</text>
    </g>
    <!-- model pill -->
    <g transform="translate(240 0)">
      <rect x="-80" y="-22" width="160" height="36" rx="18"
            fill="#d4a843" fill-opacity="0.10" stroke="#d4a843" stroke-opacity="0.4" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" fill="#d4a843" opacity="0.85" letter-spacing="1">CATBOOST</text>
    </g>
  </g>

  <!-- Caption (centered, safe zone) -->
  <text x="600" y="595" text-anchor="middle"
        font-family="ui-monospace, 'JetBrains Mono', monospace"
        font-size="20" fill="#d4a843" opacity="0.45"
        letter-spacing="3">CARDIO · MULTICENTER ML BENCHMARK</text>
</svg>
