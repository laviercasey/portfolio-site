<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="FluxRouter — work in progress">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#3a2418"/>
      <stop offset="60%" stop-color="#1a120c"/>
      <stop offset="100%" stop-color="#0a0706"/>
    </radialGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a843"/>
      <stop offset="55%" stop-color="#e07040"/>
      <stop offset="100%" stop-color="#c45a30"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#d4a843" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c45a30" stop-opacity="0.7"/>
    </linearGradient>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="14" height="14" patternTransform="rotate(45)">
      <rect width="14" height="14" fill="transparent"/>
      <line x1="0" y1="0" x2="0" y2="14" stroke="#d4a843" stroke-width="3" stroke-opacity="0.18"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#d4a843" stroke-width="0.5" opacity="0.05">
    <path d="M0 168 H1200 M0 336 H1200 M0 504 H1200"/>
    <path d="M200 0 V675 M400 0 V675 M600 0 V675 M800 0 V675 M1000 0 V675"/>
  </g>

  <!-- diagonal hatch overlay (WIP feel) -->
  <rect width="1200" height="675" fill="url(#hatch)"/>

  <!-- LLM provider nodes (left) -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="1">
    <g transform="translate(280 200)">
      <rect x="-90" y="-22" width="180" height="44" rx="22"
            fill="#1a120c" stroke="#d4a843" stroke-opacity="0.5" stroke-width="1.2"/>
      <text x="0" y="6" text-anchor="middle" fill="#d4a843" opacity="0.9">OPENAI</text>
    </g>
    <g transform="translate(280 280)">
      <rect x="-90" y="-22" width="180" height="44" rx="22"
            fill="#1a120c" stroke="#d4a843" stroke-opacity="0.5" stroke-width="1.2"/>
      <text x="0" y="6" text-anchor="middle" fill="#d4a843" opacity="0.9">ANTHROPIC</text>
    </g>
    <g transform="translate(280 360)">
      <rect x="-90" y="-22" width="180" height="44" rx="22"
            fill="#1a120c" stroke="#d4a843" stroke-opacity="0.5" stroke-width="1.2"/>
      <text x="0" y="6" text-anchor="middle" fill="#d4a843" opacity="0.9">GEMINI</text>
    </g>
    <g transform="translate(280 440)">
      <rect x="-90" y="-22" width="180" height="44" rx="22"
            fill="#1a120c" stroke="#d4a843" stroke-opacity="0.5" stroke-width="1.2"/>
      <text x="0" y="6" text-anchor="middle" fill="#d4a843" opacity="0.9">LOCAL · LLAMA</text>
    </g>
  </g>

  <!-- routing lines from providers to hub -->
  <g stroke="url(#line)" stroke-width="2" fill="none" opacity="0.55">
    <path d="M 380 200 Q 480 200, 540 320"/>
    <path d="M 380 280 Q 480 280, 540 320"/>
    <path d="M 380 360 Q 480 360, 540 320"/>
    <path d="M 380 440 Q 480 440, 540 320"/>
  </g>

  <!-- central hub -->
  <g transform="translate(620 320)">
    <circle r="78" fill="url(#grad)" opacity="0.25" filter="url(#glow)"/>
    <circle r="62" fill="#1a120c" stroke="url(#grad)" stroke-width="2"/>
    <text x="0" y="-4" text-anchor="middle"
          font-family="Georgia, serif" font-style="italic" font-weight="900"
          font-size="34" fill="url(#grad)">Flux</text>
    <text x="0" y="26" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11"
          fill="#d4a843" opacity="0.7" letter-spacing="3">ROUTER</text>
  </g>

  <!-- routing lines from hub to enterprise nodes -->
  <g stroke="url(#line)" stroke-width="2" fill="none" opacity="0.55">
    <path d="M 700 320 Q 770 200, 870 200"/>
    <path d="M 700 320 Q 770 280, 870 280"/>
    <path d="M 700 320 Q 770 360, 870 360"/>
    <path d="M 700 320 Q 770 440, 870 440"/>
  </g>

  <!-- enterprise feature nodes (right) -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="1">
    <g transform="translate(960 200)">
      <rect x="-90" y="-22" width="180" height="44" rx="22"
            fill="#1a120c" stroke="#e07040" stroke-opacity="0.5" stroke-width="1.2"/>
      <text x="0" y="6" text-anchor="middle" fill="#e07040" opacity="0.9">SSO · SCIM</text>
    </g>
    <g transform="translate(960 280)">
      <rect x="-90" y="-22" width="180" height="44" rx="22"
            fill="#1a120c" stroke="#e07040" stroke-opacity="0.5" stroke-width="1.2"/>
      <text x="0" y="6" text-anchor="middle" fill="#e07040" opacity="0.9">TOKEN BUDGETS</text>
    </g>
    <g transform="translate(960 360)">
      <rect x="-90" y="-22" width="180" height="44" rx="22"
            fill="#1a120c" stroke="#e07040" stroke-opacity="0.5" stroke-width="1.2"/>
      <text x="0" y="6" text-anchor="middle" fill="#e07040" opacity="0.9">AUDIT LOG</text>
    </g>
    <g transform="translate(960 440)">
      <rect x="-90" y="-22" width="180" height="44" rx="22"
            fill="#1a120c" stroke="#e07040" stroke-opacity="0.5" stroke-width="1.2"/>
      <text x="0" y="6" text-anchor="middle" fill="#e07040" opacity="0.9">TEAM SHARING</text>
    </g>
  </g>

  <!-- WIP badge (top right corner, safe zone) -->
  <g transform="translate(940 90)">
    <rect x="-110" y="-26" width="220" height="52" rx="26"
          fill="#1a120c" stroke="url(#grad)" stroke-width="2"/>
    <circle cx="-78" cy="0" r="8" fill="#e07040">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="-58" y="6" font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="18" font-weight="700" fill="url(#grad)" letter-spacing="2">IN DEV · WIP</text>
  </g>

  <!-- Title (centered, safe zone) -->
  <text x="600" y="555" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-weight="900" font-size="58"
        fill="url(#grad)" letter-spacing="-1.5">FluxRouter · Enterprise LLM Hub</text>

  <!-- Caption (centered) -->
  <text x="600" y="600" text-anchor="middle"
        font-family="ui-monospace, 'JetBrains Mono', monospace"
        font-size="20" fill="#d4a843" opacity="0.55"
        letter-spacing="3">MULTI-TENANT · SSO · BUDGETS · AUDIT</text>
</svg>
